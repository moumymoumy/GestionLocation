function generateTimeOptions(min, max, stepMinutes) {
  const opts = [];
  const [h1, m1] = min.split(':').map(Number);
  const [h2, m2] = max.split(':').map(Number);
  let cur = h1 * 60 + m1;
  const end = h2 * 60 + m2;
  while (cur <= end) {
    opts.push(`${String(Math.floor(cur / 60)).padStart(2, '0')}:${String(cur % 60).padStart(2, '0')}`);
    cur += stepMinutes;
  }
  return opts;
}

function describeReservationsDiff(prev, next) {
  if (!prev) return 'a initialisé le registre';
  if (next.length > prev.length) return `a ajouté ${next.length - prev.length} réservation(s)`;
  if (next.length < prev.length) return `a supprimé ${prev.length - next.length} réservation(s)`;
  return 'a modifié une réservation';
}



/* ============================= UTILITAIRES DATES ============================= */

const jsDayToOurIndex = (d) => (d === 0 ? 6 : d - 1);

function parseISO(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function toISO(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function addDays(date, n) { const d2 = new Date(date); d2.setDate(d2.getDate() + n); return d2; }
function addMonths(date, n) { const d2 = new Date(date); d2.setMonth(d2.getMonth() + n); return d2; }
function formatDateFR(dateStr) {
  const d = parseISO(dateStr);
  return d.toLocaleDateString('fr-BE', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
}
function toMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
function hoursBetween(start, end) { return Math.max(0, (toMin(end) - toMin(start)) / 60); }
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }
function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function generateRecurrentOccurrences({ weekdays, startDate, durationValue, durationUnit, startTime, endTime }) {
  if (!startDate || !weekdays.length || !durationValue) return [];
  const start = parseISO(startDate);
  let end;
  if (durationUnit === 'mois') end = addDays(addMonths(start, Number(durationValue)), -1);
  else end = addDays(start, Number(durationValue) * 7 - 1);
  const occurrences = [];
  let cur = new Date(start);
  let guard = 0;
  while (cur <= end && guard < 2000) {
    const idx = jsDayToOurIndex(cur.getDay());
    if (weekdays.includes(idx)) occurrences.push({ date: toISO(cur), start: startTime, end: endTime });
    cur = addDays(cur, 1);
    guard++;
  }
  return occurrences;
}

function occurrencesFromRange(row) {
  if (!row.dateDebut || !row.start || !row.end) return [];
  const start = parseISO(row.dateDebut);
  let end = row.dateFin ? parseISO(row.dateFin) : start;
  if (end < start) end = start;
  const occ = [];
  let cur = new Date(start);
  let guard = 0;
  while (cur <= end && guard < 370) {
    occ.push({ date: toISO(cur), start: row.start, end: row.end });
    cur = addDays(cur, 1);
    guard++;
  }
  return occ;
}

function distinctWeeksCount(occurrences) {
  const set = new Set();
  occurrences.forEach((o) => {
    const d = parseISO(o.date);
    const monday = addDays(d, -jsDayToOurIndex(d.getDay()));
    set.add(toISO(monday));
  });
  return set.size;
}
function distinctMonthsCount(occurrences) {
  const set = new Set();
  occurrences.forEach((o) => set.add(o.date.slice(0, 7)));
  return set.size;
}
function computeTotalHours(occurrences) {
  return occurrences.reduce((s, o) => s + hoursBetween(o.start, o.end), 0);
}

function suggestedQuantity(tariffType, occurrences, recurrence) {
  if (!occurrences.length) return 0;
  switch (tariffType) {
    case 'heure': return Math.round(computeTotalHours(occurrences) * 100) / 100;
    case 'jour': return occurrences.length;
    case 'semaine':
      if (recurrence && recurrence.type === 'recurrent' && recurrence.durationUnit === 'semaines') return Number(recurrence.durationValue);
      return distinctWeeksCount(occurrences);
    case 'mois':
      if (recurrence && recurrence.type === 'recurrent' && recurrence.durationUnit === 'mois') return Number(recurrence.durationValue);
      return distinctMonthsCount(occurrences);
    default: return 0;
  }
}

function euro(n) {
  return (Math.round((n + Number.EPSILON) * 100) / 100).toLocaleString('fr-BE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* ============================= VALIDATION HORAIRES ============================= */

function validateOccurrences(occurrences, tariffType) {
  const errors = new Set();
  occurrences.forEach((o) => {
    if (o.start < HORAIRE_MIN || o.end > HORAIRE_MAX) {
      errors.add(`Horaire hors plage d'ouverture (${HORAIRE_MIN}–${HORAIRE_MAX}, fermeture à 22h).`);
    }
    const h = hoursBetween(o.start, o.end);
    if (h > MAX_HEURES_PAR_JOUR) errors.add(`Durée maximale de ${MAX_HEURES_PAR_JOUR}h par jour dépassée.`);
    if (tariffType === 'heure' && h < MIN_HEURES_TARIF_HORAIRE && h > 0) {
      errors.add(`Location à l'heure : minimum ${MIN_HEURES_TARIF_HORAIRE}h par créneau.`);
    }
  });
  return Array.from(errors);
}

/* ============================= CONFLITS (règle des 15 minutes) ============================= */

function intervalGapMinutes(s1, e1, s2, e2) {
  const a1 = toMin(s1), b1 = toMin(e1), a2 = toMin(s2), b2 = toMin(e2);
  if (a1 < b2 && a2 < b1) return -1; // chevauchement
  if (b1 <= a2) return a2 - b1;
  return a1 - b2;
}

function findScheduleConflicts(newRes, allReservations, excludeId) {
  const conflicts = [];
  const newClient = (newRes.clientName || '').trim().toLowerCase();
  allReservations.forEach((res) => {
    if (res.id === excludeId) return;
    const sameClient = newClient && res.clientName.trim().toLowerCase() === newClient;
    if (sameClient) return;
    const sameLocal = res.local === newRes.local;
    const sharedEquip = res.equipement.filter((e) => newRes.equipement.some((ne) => ne.id === e.id));
    if (!sameLocal && sharedEquip.length === 0) return;
    newRes.occurrences.forEach((occA) => {
      res.occurrences.forEach((occB) => {
        if (occA.date !== occB.date) return;
        const gap = intervalGapMinutes(occA.start, occA.end, occB.start, occB.end);
        if (gap < ESPACEMENT_MIN_MINUTES) {
          const label = gap < 0 ? 'chevauchement horaire' : `${ESPACEMENT_MIN_MINUTES} min d'écart requises (${gap} min seulement)`;
          if (sameLocal) conflicts.push({ date: occA.date, with: res.clientName, what: LOCAUX.find((l) => l.id === res.local).name, reason: label });
          sharedEquip.forEach((eq) => conflicts.push({ date: occA.date, with: res.clientName, what: eq.name, reason: label }));
        }
      });
    });
  });
  return conflicts;
}

/* ============================= CALCULS FINANCIERS ============================= */

function resBase(res) { return res.unitPrice * res.quantity; }
function resDiscountAmount(res) { return resBase(res) * ((res.discountPercent || 0) / 100); }
function resEquip(res) { return res.equipement.reduce((s, e) => s + e.price, 0); }
function resCaution(res) { return res.equipement.reduce((s, e) => s + (e.caution || 0), 0); }
function resSubtotalHT(res) { return resBase(res) - resDiscountAmount(res) + resEquip(res) + resCaution(res); }
function resTvaAmount(res) { return resSubtotalHT(res) * ((res.tvaPercent || 0) / 100); }
function resTotal(res) { return resSubtotalHT(res) + resTvaAmount(res); }

/* ============================= STOCKAGE : IndexedDB (handle fichier) ============================= */

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('asbl-registre-db', 1);
    req.onupgradeneeded = () => { req.result.createObjectStore('handles'); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function writeReservationsToFile(handle, data) {
  try {
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    return true;
  } catch (e) { return false; }
}

  const occurrences = useMemo(() => {
    if (scheduleType === 'ponctuel') return ponctuelDates.flatMap(occurrencesFromRange);
    return generateRecurrentOccurrences({ weekdays, startDate: recStartDate, durationValue, durationUnit, startTime: recStart, endTime: recEnd });
  }, [scheduleType, ponctuelDates, weekdays, recStartDate, durationValue, durationUnit, recStart, recEnd]);

  const recurrenceInfo = scheduleType === 'recurrent' ? { type: 'recurrent', durationUnit } : null;
  const autoQty = useMemo(() => suggestedQuantity(tariffType, occurrences, recurrenceInfo), [tariffType, occurrences, recurrenceInfo]);
  const quantity = quantityOverride !== null ? quantityOverride : autoQty;
  const totalHours = useMemo(() => Math.round(computeTotalHours(occurrences) * 100) / 100, [occurrences]);

  useEffect(() => { setQuantityOverride(null); }, [tariffType, scheduleType, JSON.stringify(occurrences)]);
  useEffect(() => { setUnitPrice(String(computeUnitPriceForTariff(tariffType))); }, [tariffType]);

  const scheduleErrors = useMemo(() => validateOccurrences(occurrences, tariffType), [occurrences, tariffType]);

  function toggleEquip(id) {
    const eqDef = EQUIPEMENT_CATALOG.find((e) => e.id === id);
    setSelectedEquip((prev) => {
      const next = { ...prev };
      if (id in next) { delete next[id]; return next; }
      next[id] = {
        price: eqDef.isHourly ? Math.round(eqDef.hourlyRate * totalHours * 100) / 100 : eqDef.defaultPrice,
        cautionOn: false, caution: eqDef.defaultCaution,
        accordageOn: false, accordagePrice: ACCORDAGE_PRICE,
      };
      return next;
    });
  }
  function updateEquipField(id, field, val) {
    setSelectedEquip((prev) => ({ ...prev, [id]: { ...prev[id], [field]: val } }));
  }
  function toggleEquipBool(id, field) {
    setSelectedEquip((prev) => ({ ...prev, [id]: { ...prev[id], [field]: !prev[id][field] } }));
  }
  function applyTechnicienSuggestion(id) {
    const eqDef = EQUIPEMENT_CATALOG.find((e) => e.id === id);
    updateEquipField(id, 'price', Math.round(eqDef.hourlyRate * totalHours * 100) / 100);
  }

  function addPonctuelRow() {
    setPonctuelDates((rows) => {
      const last = rows[rows.length - 1];
      return [...rows, { dateDebut: '', dateFin: '', start: last?.start || '09:00', end: last?.end || '17:00' }];
    });
  }
  function removePonctuelRow(idx) { setPonctuelDates((rows) => rows.filter((_, i) => i !== idx)); }
  function updatePonctuelRow(idx, field, val) {
    setPonctuelDates((rows) => rows.map((r, i) => (i === idx ? { ...r, [field]: val } : r)));
  }
  function toggleWeekday(idx) {
    setWeekdays((w) => (w.includes(idx) ? w.filter((x) => x !== idx) : [...w, idx].sort()));
  }

  const equipementList = [];
  Object.entries(selectedEquip).forEach(([id, v]) => {
    const cat = EQUIPEMENT_CATALOG.find((e) => e.id === id);
    equipementList.push({
      id, name: cat.name, type: cat.type,
      price: Number(v.price) || 0,
      cautionOn: !!v.cautionOn,
      caution: v.cautionOn ? (Number(v.caution) || 0) : 0,
    });
    if (cat.hasAccordage && v.accordageOn) {
      equipementList.push({
        id: id + '_accordage', name: `Accordage — ${cat.name}`, type: 'service',
        price: Number(v.accordagePrice) || 0, cautionOn: false, caution: 0,
      });
    }
  });

  const discountPercent = Number(discountRates[tariffType]) || 0;
  const baseTotal = (Number(unitPrice) || 0) * (Number(quantity) || 0);
  const discountAmount = baseTotal * (discountPercent / 100);
  const equipTotal = equipementList.reduce((s, e) => s + e.price, 0);
  const cautionTotal = equipementList.reduce((s, e) => s + e.caution, 0);
  const subtotalHT = baseTotal - discountAmount + equipTotal + cautionTotal;
  const tvaAmount = subtotalHT * ((Number(tvaPercent) || 0) / 100);
  const total = subtotalHT + tvaAmount;

  const draftRes = { clientName, local, equipement: equipementList, occurrences };
  const conflicts = useMemo(
    () => (occurrences.length && clientName.trim() ? findScheduleConflicts(draftRes, reservations, null) : []),
    [local, clientName, JSON.stringify(equipementList), JSON.stringify(occurrences), reservations]
  );

  const canSubmit = clientName.trim() && occurrences.length > 0 && Number(unitPrice) >= 0 && scheduleErrors.length === 0 && conflicts.length === 0;

  function handleSubmit() {
    if (!canSubmit) return;
    const newRes = {
      id: uid(),
      clientName: clientName.trim(),
      local,
      scheduleType,
      recurrence: scheduleType === 'recurrent' ? { weekdays, startDate: recStartDate, durationValue, durationUnit, startTime: recStart, endTime: recEnd } : null,
      ponctuelDates: scheduleType === 'ponctuel' ? ponctuelDates.filter((d) => d.dateDebut) : [],
      occurrences,
      tariffType,
      unitPrice: Number(unitPrice) || 0,
      quantity: Number(quantity) || 0,
      discountPercent,
      tvaPercent: Number(tvaPercent) || 0,
      equipement: equipementList,
      paymentStatus,
      notes,
      createdAt: Date.now(),
    };
    onCreate(newRes);
    setClientName(''); setLocal('rdc'); setScheduleType('ponctuel');
    setPonctuelDates([{ dateDebut: '', dateFin: '', start: '14:00', end: '19:00' }]);
    setWeekdays([0]); setRecStartDate(''); setDurationValue(1); setDurationUnit('mois'); setRecStart('18:00'); setRecEnd('20:00');
    setTariffType('heure'); setUnitPrice('20'); setQuantityOverride(null);
    setSelectedEquip({}); setPaymentStatus('attente'); setNotes('');
    setJustSaved(true);
    setTimeout(() => setJustSaved(false), 2500);
  }

  return (
    <div className="grid grid-cols-1 sm:grid-cols-5 gap-6 items-start">
      <div className="sm:col-span-3 space-y-5">

        <div className="bg-card rounded-lg border border-paperdark p-5">
          <div className="text-xs uppercase tracking-widest text-muted font-semibold mb-3">Client & local</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-ink mb-1">Nom du client / de l'activité</label>
              <input value={clientName} onChange={(e) => setClientName(e.target.value)} placeholder="ex : M. Nsimba — répétitions chorale"
                className="w-full border border-paperdark rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ink/30" />
            </div>
            <div>
              <label className="block text-sm font-medium text-ink mb-1">Local demandé</label>
              <div className="flex gap-2">
                {LOCAUX.map((l) => (
                  <button key={l.id} onClick={() => setLocal(l.id)}
                    className={`chip flex-1 px-3 py-2 rounded-md text-sm font-medium border ${local === l.id ? 'bg-ink text-white border-ink' : 'bg-white border-paperdark text-inktext hover:border-ink/40'}`}>
                    {l.name}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div className="bg-card rounded-lg border border-paperdark p-5">
          <div className="text-xs uppercase tracking-widest text-muted font-semibold mb-1">Créneaux & récurrence</div>
          <div className="text-[11px] text-muted mb-3">Horaires possibles : {HORAIRE_MIN}–{HORAIRE_MAX} (fermeture à 22h) · {MAX_HEURES_PAR_JOUR}h max par jour · minimum {MIN_HEURES_TARIF_HORAIRE}h pour un tarif à l'heure · {ESPACEMENT_MIN_MINUTES} min d'écart requises entre 2 clients différents.</div>
          <div className="flex gap-2 mb-4">
            <button onClick={() => setScheduleType('ponctuel')}
              className={`chip px-3 py-1.5 rounded-full text-sm font-medium border ${scheduleType === 'ponctuel' ? 'bg-ink text-white border-ink' : 'bg-white border-paperdark hover:border-ink/40'}`}>
              📅 Dates ponctuelles
            </button>
            <button onClick={() => setScheduleType('recurrent')}
              className={`chip px-3 py-1.5 rounded-full text-sm font-medium border ${scheduleType === 'recurrent' ? 'bg-ink text-white border-ink' : 'bg-white border-paperdark hover:border-ink/40'}`}>
              🔁 Récurrent (jour fixe)
            </button>
          </div>

          {scheduleType === 'ponctuel' ? (
            <div className="space-y-3">
              {ponctuelDates.map((row, idx) => (
                <div key={idx} className="flex flex-wrap items-end gap-2 bg-paper/50 rounded-md p-2">
                  <div className="flex flex-col">
                    <label className="text-[10px] text-muted mb-0.5">Date début</label>
                    <input type="date" value={row.dateDebut} onChange={(e) => updatePonctuelRow(idx, 'dateDebut', e.target.value)}
                      className="border border-paperdark rounded-md px-2 py-1.5 text-sm" />
                  </div>
                  <div className="flex flex-col">
                    <label className="text-[10px] text-muted mb-0.5">Date fin (optionnel)</label>
                    <input type="date" value={row.dateFin} onChange={(e) => updatePonctuelRow(idx, 'dateFin', e.target.value)}
                      className="border border-paperdark rounded-md px-2 py-1.5 text-sm" />
                  </div>
                  <span className="text-muted text-sm pb-1.5">de</span>
                  <select value={row.start} onChange={(e) => updatePonctuelRow(idx, 'start', e.target.value)}
                    className="border border-paperdark rounded-md px-2 py-1.5 text-sm font-mono">
                    {TIME_OPTIONS.map((t) => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <span className="text-muted text-sm pb-1.5">à</span>
                  <select value={row.end} onChange={(e) => updatePonctuelRow(idx, 'end', e.target.value)}
                    className="border border-paperdark rounded-md px-2 py-1.5 text-sm font-mono">
                    {TIME_OPTIONS.map((t) => <option key={t} value={t}>{t}</option>)}
                  </select>
                  {ponctuelDates.length > 1 && (
                    <button onClick={() => removePonctuelRow(idx)} className="text-brick text-sm hover:underline ml-auto pb-1.5">Retirer</button>
                  )}
                </div>
              ))}
              <button onClick={addPonctuelRow} className="text-sm font-medium text-ink hover:underline mt-1">+ Ajouter une plage de dates</button>
            </div>
          ) : (
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-ink mb-1.5">Jour(s) de la semaine</label>
                <div className="flex gap-1.5 flex-wrap">
                  {JOURS.map((j, idx) => (
                    <button key={j} onClick={() => toggleWeekday(idx)}
                      className={`chip w-11 h-9 rounded-md text-xs font-semibold border ${weekdays.includes(idx) ? 'bg-ink text-white border-ink' : 'bg-white border-paperdark hover:border-ink/40'}`}>
                      {j}
                    </button>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div>
                  <label className="block text-sm font-medium text-ink mb-1">De</label>
                  <select value={recStart} onChange={(e) => setRecStart(e.target.value)} className="w-full border border-paperdark rounded-md px-2 py-1.5 text-sm font-mono">
                    {TIME_OPTIONS.map((t) => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-ink mb-1">À</label>
                  <select value={recEnd} onChange={(e) => setRecEnd(e.target.value)} className="w-full border border-paperdark rounded-md px-2 py-1.5 text-sm font-mono">
                    {TIME_OPTIONS.map((t) => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-ink mb-1">Début le</label>
                  <input type="date" value={recStartDate} onChange={(e) => setRecStartDate(e.target.value)} className="w-full border border-paperdark rounded-md px-2 py-1.5 text-sm" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-ink mb-1">Pendant</label>
                  <div className="flex gap-1">
                    <input type="number" min="1" value={durationValue} onChange={(e) => setDurationValue(e.target.value)} className="w-16 border border-paperdark rounded-md px-2 py-1.5 text-sm" />
                    <select value={durationUnit} onChange={(e) => setDurationUnit(e.target.value)} className="flex-1 border border-paperdark rounded-md px-1 py-1.5 text-sm">
                      <option value="semaines">semaine(s)</option>
                      <option value="mois">mois</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          )}

          {occurrences.length > 0 && (
            <div className="mt-4 pt-3 border-t border-paperdark">
              <div className="text-xs text-muted mb-1.5">{occurrences.length} occurrence(s) générée(s) · {totalHours}h au total :</div>
              <div className="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto">
                {occurrences.map((o, i) => (
                  <span key={i} className="font-mono text-xs bg-paper px-2 py-1 rounded border border-paperdark whitespace-nowrap">
                    {formatDateFR(o.date)} · {o.start}–{o.end}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="bg-card rounded-lg border border-paperdark p-5">
          <div className="text-xs uppercase tracking-widest text-muted font-semibold mb-3">Tarification</div>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div>
              <label className="block text-sm font-medium text-ink mb-1">Type de tarif</label>
              <select value={tariffType} onChange={(e) => setTariffType(e.target.value)} className="w-full border border-paperdark rounded-md px-2 py-2 text-sm">
                <option value="heure">À l'heure</option>
                <option value="jour">À la journée</option>
                <option value="semaine">À la semaine</option>
                <option value="mois">Au mois</option>
              </select>
            </div>
            <div>
              <label className="block text-sm font-medium text-ink mb-1">Montant unitaire (€)</label>
              <input type="number" min="0" step="0.5" value={unitPrice} onChange={(e) => setUnitPrice(e.target.value)}
                className="w-full border border-paperdark rounded-md px-2 py-2 text-sm font-mono" />
              <div className="text-[11px] text-muted mt-1">
                tarif standard : {computeUnitPriceForTariff(tariffType)}€ {TARIFF_LABELS[tariffType]} (modifiable)
              </div>
            </div>
            <div>
              <label className="block text-sm font-medium text-ink mb-1">Quantité facturée</label>
              <input type="number" min="0" step="1" value={quantity} onChange={(e) => setQuantityOverride(e.target.value)}
                className="w-full border border-paperdark rounded-md px-2 py-2 text-sm font-mono" />
              <div className="text-[11px] text-muted mt-1">suggestion auto : {autoQty}</div>
            </div>
            <div>
              <label className="block text-sm font-medium text-ink mb-1">Sous-total</label>
              <div className="w-full border border-paperdark bg-paper rounded-md px-2 py-2 text-sm font-mono font-semibold">{euro(baseTotal)} €</div>
            </div>
          </div>

          <div className="mt-4 pt-4 border-t border-paperdark">
            <div className="text-xs font-semibold text-ink mb-2">Remises automatiques (appliquées selon le type de tarif)</div>
            <div className="grid grid-cols-3 gap-3">
              {['jour', 'semaine', 'mois'].map((t) => (
                <div key={t}>
                  <label className="block text-xs text-muted mb-1">{t === 'jour' ? 'À la journée' : t === 'semaine' ? 'À la semaine' : 'Au mois'} (%)</label>
                  <div className="flex items-center gap-1">
                    <input type="number" min="0" max="100" step="1" value={discountRates[t]}
                      onChange={(e) => setDiscountRates((prev) => ({ ...prev, [t]: e.target.value }))}
                      className={`w-full border rounded-md px-2 py-1.5 text-sm font-mono ${tariffType === t ? 'border-ink bg-ink/5' : 'border-paperdark'}`} />
                    <span className="text-xs text-muted">%</span>
                  </div>
                </div>
              ))}
            </div>
            {discountPercent > 0 && <div className="mt-2 text-sm text-forestdark font-medium">Remise appliquée : -{discountPercent}% soit -{euro(discountAmount)} €</div>}
          </div>

          <div className="mt-4 pt-4 border-t border-paperdark">
            <div className="text-xs font-semibold text-ink mb-2">TVA</div>
            <div className="flex items-center gap-2 max-w-[160px]">
              <input type="number" min="0" max="100" step="0.5" value={tvaPercent} onChange={(e) => setTvaPercent(e.target.value)}
                className="w-full border border-paperdark rounded-md px-2 py-1.5 text-sm font-mono" />
              <span className="text-xs text-muted">%</span>
            </div>
            <div className="text-[11px] text-muted mt-1">Pourcentage libre — laissez 0 si non applicable. S'ajoute au total facturé.</div>
          </div>
        </div>

        <div className="bg-card rounded-lg border border-paperdark p-5">
          <div className="text-xs uppercase tracking-widest text-muted font-semibold mb-3">Matériel en option</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {EQUIPEMENT_CATALOG.map((eq) => {
              const checked = eq.id in selectedEquip;
              const v = selectedEquip[eq.id];
              return (
                <div key={eq.id} className={`rounded-md border p-3 ${checked ? 'border-ink bg-ink/5' : 'border-paperdark'}`}>
                  <div className="flex items-center gap-3">
                    <input type="checkbox" className="sq w-4 h-4" checked={checked} onChange={() => toggleEquip(eq.id)} />
                    <div className="flex-1 text-sm font-medium text-inktext">{eq.icon} {eq.name}</div>
                    {checked && (
                      <div className="flex items-center gap-1">
                        <input type="number" min="0" step="0.5" value={v.price} onChange={(e) => updateEquipField(eq.id, 'price', e.target.value)}
                          className="w-16 border border-paperdark rounded px-1.5 py-1 text-xs font-mono" />
                        <span className="text-xs text-muted">€</span>
                      </div>
                    )}
                  </div>

                  {checked && eq.isHourly && (
                    <div className="mt-1.5 text-[11px] text-muted flex items-center gap-1.5">
                      <span>{eq.hourlyRate}€/h × {totalHours}h = {euro(eq.hourlyRate * totalHours)}€</span>
                      <button onClick={() => applyTechnicienSuggestion(eq.id)} className="text-ink underline">appliquer</button>
                    </div>
                  )}

                  {checked && eq.hasAccordage && (
                    <div className="mt-2 pt-2 border-t border-paperdark/70 flex items-center gap-2">
                      <input type="checkbox" className="sq w-3.5 h-3.5" checked={v.accordageOn} onChange={() => toggleEquipBool(eq.id, 'accordageOn')} />
                      <span className="text-xs text-muted flex-1">🎼 Ajouter un accordage</span>
                      {v.accordageOn && (
                        <div className="flex items-center gap-1">
                          <input type="number" min="0" step="1" value={v.accordagePrice} onChange={(e) => updateEquipField(eq.id, 'accordagePrice', e.target.value)}
                            className="w-16 border border-ink/30 bg-ink/5 rounded px-1.5 py-1 text-xs font-mono" />
                          <span className="text-xs text-muted">€</span>
                        </div>
                      )}
                    </div>
                  )}

                  {checked && !eq.noCaution && (
                    <div className="mt-2 pt-2 border-t border-paperdark/70 flex items-center gap-2">
                      <input type="checkbox" className="sq w-3.5 h-3.5" checked={v.cautionOn} onChange={() => toggleEquipBool(eq.id, 'cautionOn')} />
                      <span className="text-xs text-muted flex-1">Ajouter une caution</span>
                      {v.cautionOn && (
                        <div className="flex items-center gap-1">
                          <input type="number" min="0" step="1" value={v.caution} onChange={(e) => updateEquipField(eq.id, 'caution', e.target.value)}
                            className="w-16 border border-amber/50 bg-amber/5 rounded px-1.5 py-1 text-xs font-mono" />
                          <span className="text-xs text-muted">€</span>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div className="bg-card rounded-lg border border-paperdark p-5">
          <div className="text-xs uppercase tracking-widest text-muted font-semibold mb-3">Statut du paiement & notes</div>
          <div className="flex gap-2 mb-3">
            <button onClick={() => setPaymentStatus('attente')}
              className={`chip px-3 py-1.5 rounded-md text-sm font-medium border ${paymentStatus === 'attente' ? 'bg-amber text-white border-amber' : 'bg-white border-paperdark'}`}>
              En attente de paiement
            </button>
            <button onClick={() => setPaymentStatus('paye')}
              className={`chip px-3 py-1.5 rounded-md text-sm font-medium border ${paymentStatus === 'paye' ? 'bg-forest text-white border-forest' : 'bg-white border-paperdark'}`}>
              Payé — période bloquée
            </button>
          </div>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows="2" placeholder="Notes libres (contexte, demande par e-mail, particularités...)"
            className="w-full border border-paperdark rounded-md px-3 py-2 text-sm" />
        </div>

        {scheduleErrors.length > 0 && (
          <div className="rounded-lg border border-brick/40 bg-brick/5 p-4">
            <div className="text-sm font-semibold text-brick mb-2">⛔ Créneau non valide</div>
            <ul className="text-sm text-inktext space-y-1">{scheduleErrors.map((msg, i) => <li key={i}>• {msg}</li>)}</ul>
          </div>
        )}

        {conflicts.length > 0 && (
          <div className="rounded-lg border border-brick/40 bg-brick/5 p-4">
            <div className="text-sm font-semibold text-brick mb-2">⛔ Réservation bloquée — {conflicts.length} conflit(s)</div>
            <ul className="text-sm text-inktext space-y-1">
              {conflicts.slice(0, 8).map((c, i) => (
                <li key={i}>• {formatDateFR(c.date)} — <strong>{c.what}</strong> déjà réservé pour <strong>{c.with}</strong> ({c.reason})</li>
              ))}
            </ul>
            <div className="text-xs text-muted mt-2">Aucune exception possible sauf s'il s'agit du même client (nom identique).</div>
          </div>
        )}

        <button onClick={handleSubmit} disabled={!canSubmit}
          className={`w-full py-3 rounded-md font-semibold text-sm transition ${canSubmit ? 'bg-ink text-white hover:bg-inkdark' : 'bg-paperdark text-muted cursor-not-allowed'}`}>
          Enregistrer la réservation
        </button>
        {justSaved && <div className="text-center text-sm text-forestdark font-medium">✓ Réservation enregistrée</div>}
      </div>

      {/* ---- Colonne reçu ---- */}
      <div className="sm:col-span-2 sm:sticky sm:top-6 mt-2 sm:mt-0">
        <div className="receipt rounded-t-md rounded-b-none px-5 pt-5 pb-8 font-mono">
          <div className="text-center mb-3">
            <div className="font-display text-lg font-semibold text-ink tracking-wide">REÇU — ESTIMATION</div>
            <div className="text-[11px] text-muted">Association locale — usage interne</div>
          </div>
          <div className="receipt-dashed pt-3 text-xs space-y-1 text-inktext">
            <div className="flex justify-between"><span>Client</span><span className="font-semibold text-right">{clientName || '—'}</span></div>
            <div className="flex justify-between"><span>Local</span><span>{LOCAUX.find((l) => l.id === local)?.name}</span></div>
            <div className="flex justify-between"><span>Créneaux</span><span>{occurrences.length} occ.</span></div>
          </div>
          <div className="receipt-dashed pt-3 mt-3 text-xs space-y-1">
            <div className="flex justify-between text-inktext">
              <span>{quantity} × {euro(Number(unitPrice) || 0)} € {TARIFF_LABELS[tariffType]}</span>
              <span>{euro(baseTotal)} €</span>
            </div>
            {discountPercent > 0 && (
              <div className="flex justify-between text-forestdark"><span>Remise ({discountPercent}%)</span><span>-{euro(discountAmount)} €</span></div>
            )}
            {equipementList.map((e) => (
              <div key={e.id} className="flex justify-between text-muted"><span>+ {e.name}</span><span>{euro(e.price)} €</span></div>
            ))}
            {cautionTotal > 0 && (
              <div className="flex justify-between text-amberdark"><span>Caution (incluse au total)</span><span>{euro(cautionTotal)} €</span></div>
            )}
          </div>
          <div className="receipt-dashed pt-3 mt-3 text-xs space-y-1">
            <div className="flex justify-between text-inktext"><span>Sous-total</span><span>{euro(subtotalHT)} €</span></div>
            {Number(tvaPercent) > 0 && (
              <div className="flex justify-between text-inktext"><span>TVA ({tvaPercent}%)</span><span>{euro(tvaAmount)} €</span></div>
            )}
          </div>
          <div className="receipt-dashed pt-3 mt-3 flex justify-between items-baseline">
            <span className="text-sm font-semibold text-ink">TOTAL</span>
            <span className="text-2xl font-bold text-ink">{euro(total)} €</span>
          </div>
          <div className="mt-3 flex justify-center"><PaymentBadge status={paymentStatus} /></div>
        </div>
      </div>
    </div>
  );
}

/* ============================= PLANNING : GRILLE ============================= */

function CalendarGrid({ reservations, filterLocal, onSelectOccurrence }) {
  const [cursor, setCursor] = useState(() => { const d = new Date(); d.setDate(1); return d; });
  const byLocal = filterLocal === 'tous' ? LOCAUX : LOCAUX.filter((l) => l.id === filterLocal);
  const monthLabel = `${MOIS_LONG[cursor.getMonth()]} ${cursor.getFullYear()}`;
  const firstOfMonth = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  const startOffset = jsDayToOurIndex(firstOfMonth.getDay());
  const daysInMonth = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  function occurrencesForDay(day, localId) {
    if (!day) return [];
    const iso = toISO(new Date(cursor.getFullYear(), cursor.getMonth(), day));
    const list = [];
    reservations.forEach((res) => {
      if (res.local !== localId) return;
      res.occurrences.forEach((occ) => { if (occ.date === iso) list.push({ res, occ }); });
    });
    return list;
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <button onClick={() => setCursor(addMonths(cursor, -1))} className="px-3 py-1.5 rounded-md border border-paperdark hover:border-ink/40 text-sm">‹ Précédent</button>
        <div className="font-display text-lg font-semibold text-ink">{monthLabel}</div>
        <button onClick={() => setCursor(addMonths(cursor, 1))} className="px-3 py-1.5 rounded-md border border-paperdark hover:border-ink/40 text-sm">Suivant ›</button>
      </div>
      <div className={`grid gap-4 ${byLocal.length === 2 ? 'lg:grid-cols-2' : 'grid-cols-1'}`}>
        {byLocal.map((loc) => (
          <div key={loc.id} className="bg-card rounded-lg border border-paperdark p-4">
            <div className="text-sm font-semibold text-ink mb-3">{loc.name}</div>
            <div className="grid grid-cols-7 gap-1 mb-1">
              {JOURS.map((j) => <div key={j} className="text-[10px] font-semibold text-muted text-center py-1">{j}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-1">
              {cells.map((day, idx) => {
                const occs = occurrencesForDay(day, loc.id);
                const isToday = day && toISO(new Date(cursor.getFullYear(), cursor.getMonth(), day)) === toISO(new Date());
                return (
                  <div key={idx} className={`min-h-[64px] rounded border text-left p-1 ${day ? 'border-paperdark bg-white' : 'border-transparent'} ${isToday ? 'ring-2 ring-ink/30' : ''}`}>
                    {day && <div className="text-[10px] text-muted mb-0.5">{day}</div>}
                    <div className="space-y-0.5">
                      {occs.slice(0, 2).map((o, i) => (
                        <button key={i} onClick={() => onSelectOccurrence(o.res)}
                          className={`w-full text-left text-[9.5px] leading-tight rounded px-1 py-0.5 truncate ${o.res.paymentStatus === 'paye' ? 'bg-forest/15 text-forestdark' : 'bg-amber/20 text-amberdark'}`}>
                          {o.occ.start} {o.res.clientName}
                        </button>
                      ))}
                      {occs.length > 2 && <div className="text-[9px] text-muted px-1">+{occs.length - 2} autre(s)</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div className="flex gap-4 mt-3 text-xs text-muted">
        <span className="inline-flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bg-amber/40 inline-block"></span> En attente</span>
        <span className="inline-flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bg-forest/40 inline-block"></span> Payé / bloqué</span>
      </div>
    </div>
  );
}

/* ============================= PLANNING : LISTE ============================= */

function PlanningList({ reservations, filterLocal, onSelectOccurrence }) {
  const rows = [];
  reservations.forEach((res) => {
    if (filterLocal !== 'tous' && res.local !== filterLocal) return;
    res.occurrences.forEach((occ) => rows.push({ res, occ }));
  });
  rows.sort((a, b) => (a.occ.date + a.occ.start).localeCompare(b.occ.date + b.occ.start));
  const grouped = {};
  rows.forEach((r) => { const key = r.occ.date.slice(0, 7); grouped[key] = grouped[key] || []; grouped[key].push(r); });

  if (!rows.length) return <div className="text-sm text-muted py-8 text-center">Aucun créneau à afficher pour ce filtre.</div>;

  return (
    <div className="space-y-6">
      {Object.entries(grouped).map(([key, items]) => {
        const [y, m] = key.split('-');
        return (
          <div key={key}>
            <div className="text-xs uppercase tracking-widest text-muted font-semibold mb-2">{MOIS_LONG[Number(m) - 1]} {y}</div>
            <div className="bg-card rounded-lg border border-paperdark divide-y divide-paperdark overflow-hidden">
              {items.map((r, i) => (
                <button key={i} onClick={() => onSelectOccurrence(r.res)} className="w-full flex flex-wrap items-center gap-3 px-4 py-2.5 text-left hover:bg-paper/60 transition">
                  <div className="font-mono text-xs w-28 shrink-0 text-inktext">{formatDateFR(r.occ.date)}</div>
                  <div className="font-mono text-xs w-20 shrink-0 text-muted">{r.occ.start}–{r.occ.end}</div>
                  <LocalBadge localId={r.res.local} />
                  <div className="text-sm font-medium flex-1 min-w-[120px] truncate">{r.res.clientName}</div>
                  <div className="flex gap-1 flex-wrap">{r.res.equipement.map((e) => <Badge key={e.id} tone="muted">{e.name}</Badge>)}</div>
                  <PaymentBadge status={r.res.paymentStatus} />
                  <div className="font-mono text-sm font-semibold w-20 text-right">{euro(resTotal(r.res))} €</div>
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PlanningView({ reservations }) {
  const [filterLocal, setFilterLocal] = useState('tous');
  const [view, setView] = useState('grille');
  const [selected, setSelected] = useState(null);

  return (
    <div>
      <SectionTitle eyebrow="Vue d'ensemble" title="Planning des locaux" />
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div className="flex gap-1.5">
          {[{ id: 'tous', name: 'Les deux locaux' }, ...LOCAUX].map((l) => (
            <button key={l.id} onClick={() => setFilterLocal(l.id)}
              className={`chip px-3 py-1.5 rounded-full text-sm font-medium border ${filterLocal === l.id ? 'bg-ink text-white border-ink' : 'bg-white border-paperdark hover:border-ink/40'}`}>
              {l.name}
            </button>
          ))}
        </div>
        <div className="flex rounded-md border border-paperdark overflow-hidden">
          <button onClick={() => setView('grille')} className={`px-4 py-1.5 text-sm font-medium ${view === 'grille' ? 'bg-ink text-white' : 'bg-white text-inktext'}`}>▦ Grille</button>
          <button onClick={() => setView('liste')} className={`px-4 py-1.5 text-sm font-medium ${view === 'liste' ? 'bg-ink text-white' : 'bg-white text-inktext'}`}>☰ Liste</button>
        </div>
      </div>

      {view === 'grille'
        ? <CalendarGrid reservations={reservations} filterLocal={filterLocal} onSelectOccurrence={(res) => setSelected(res)} />

          <ReservationDetail res={selected} />

function ReservationDetail({ res }) {
  const base = resBase(res), discount = resDiscountAmount(res), equip = resEquip(res), caution = resCaution(res);
  const subtotal = resSubtotalHT(res), tva = resTvaAmount(res), total = resTotal(res);
  return (
    <div className="space-y-3 text-sm">
      <div className="flex flex-wrap gap-2"><LocalBadge localId={res.local} /><PaymentBadge status={res.paymentStatus} /></div>
      <div><span className="text-muted">Tarif : </span>{res.quantity} × {euro(res.unitPrice)} € {TARIFF_LABELS[res.tariffType]} = {euro(base)} €</div>
      {discount > 0 && <div className="text-forestdark">Remise appliquée : -{res.discountPercent}% (-{euro(discount)} €)</div>}
      <div><span className="text-muted">Matériel : </span>{res.equipement.length ? res.equipement.map((e) => `${e.name} (${euro(e.price)}€)`).join(', ') : 'aucun'}</div>
      {caution > 0 && <div className="text-amberdark">Caution incluse : {euro(caution)} €</div>}

        </div>

      {res.notes && <div><span className="text-muted">Notes : </span>{res.notes}</div>}

}

/* ============================= MATÉRIEL ============================= */

function MaterielView({ reservations }) {
  const now = new Date();
  const nowISO = toISO(now);
  const nowTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

  return (
    <div>
      <SectionTitle eyebrow="Inventaire" title="Statut du matériel" />
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {EQUIPEMENT_CATALOG.map((eq) => {
          const bookings = [];
          reservations.forEach((res) => {
            const used = res.equipement.find((e) => e.id === eq.id);
            if (!used) return;
            res.occurrences.forEach((occ) => bookings.push({ res, occ }));
          });
          bookings.sort((a, b) => (a.occ.date + a.occ.start).localeCompare(b.occ.date + b.occ.start));
          const busyNow = bookings.some((b) => b.occ.date === nowISO && b.occ.start <= nowTime && nowTime < b.occ.end);
          const upcoming = bookings.filter((b) => b.occ.date >= nowISO);

          return (
            <div key={eq.id} className="bg-card rounded-lg border border-paperdark p-5">
              <div className="flex items-center justify-between mb-3">
                <div className="text-base font-semibold text-ink">{eq.icon} {eq.name}</div>
                {busyNow ? <Badge tone="brick">Réservé actuellement</Badge> : <Badge tone="forest">Disponible maintenant</Badge>}
              </div>
              <div className="text-xs uppercase tracking-widest text-muted font-semibold mb-2">Prochaines réservations</div>
              {upcoming.length === 0 ? <div className="text-sm text-muted">Aucune réservation à venir.</div> : (
                <div className="space-y-1.5 max-h-52 overflow-y-auto">
                  {upcoming.slice(0, 10).map((b, i) => (
                    <div key={i} className="flex items-center gap-2 text-sm">
                      <span className="font-mono text-xs text-muted w-24 shrink-0">{formatDateFR(b.occ.date)}</span>
                      <span className="font-mono text-xs w-20 shrink-0">{b.occ.start}–{b.occ.end}</span>
                      <span className="truncate">{b.res.clientName}</span>
                      <LocalBadge localId={b.res.local} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================= TOUTES LES RÉSERVATIONS ============================= */

function ReservationsListView({ reservations, onTogglePaiement, onDelete }) {
  const [search, setSearch] = useState('');
  const [filterLocal, setFilterLocal] = useState('tous');
  const [filterStatut, setFilterStatut] = useState('tous');
  const [expanded, setExpanded] = useState(null);
  const [toDelete, setToDelete] = useState(null);

  const filtered = reservations.filter((r) => {
    if (search && !r.clientName.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterLocal !== 'tous' && r.local !== filterLocal) return false;
    if (filterStatut !== 'tous' && r.paymentStatus !== filterStatut) return false;
    return true;
  }).sort((a, b) => b.createdAt - a.createdAt);

  return (
    <div>
      <SectionTitle eyebrow="Registre complet" title="Toutes les réservations" />
      <div className="flex flex-wrap gap-2 mb-5">
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Rechercher un client..."
          className="border border-paperdark rounded-md px-3 py-2 text-sm flex-1 min-w-[180px]" />
        <select value={filterLocal} onChange={(e) => setFilterLocal(e.target.value)} className="border border-paperdark rounded-md px-2 py-2 text-sm">
          <option value="tous">Tous les locaux</option>
          {LOCAUX.map((l) => <option key={l.id} value={l.id}>{l.name}</option>)}
        </select>
        <select value={filterStatut} onChange={(e) => setFilterStatut(e.target.value)} className="border border-paperdark rounded-md px-2 py-2 text-sm">
          <option value="tous">Tous les statuts</option>
          <option value="attente">En attente</option>
          <option value="paye">Payé</option>
        </select>
      </div>

      {filtered.length === 0 && <div className="text-sm text-muted py-10 text-center">Aucune réservation ne correspond à ces critères.</div>}

      <div className="space-y-3">
        {filtered.map((res) => {
          const total = resTotal(res);
          const isOpen = expanded === res.id;
          const summary = res.scheduleType === 'recurrent'
            ? `Récurrent — ${res.recurrence.weekdays.map((w) => JOURS_LONG[w]).join('/')} ${res.recurrence.startTime}-${res.recurrence.endTime} (${res.occurrences.length} occ.)`
            : `Ponctuel — ${res.occurrences.length} date(s)`;
          return (
            <div key={res.id} className="bg-card rounded-lg border border-paperdark overflow-hidden">
              <div className="flex flex-wrap items-center gap-3 px-4 py-3">
                <div className="min-w-[160px] flex-1">
                  <div className="text-sm font-semibold text-ink">{res.clientName}</div>
                  <div className="text-xs text-muted">{summary}</div>
                </div>
                <LocalBadge localId={res.local} />
                <div className="flex gap-1 flex-wrap">{res.equipement.map((e) => <Badge key={e.id} tone="muted">{e.name}</Badge>)}</div>
                <div className="font-mono text-sm font-semibold">{euro(total)} €</div>
                <button onClick={() => onTogglePaiement(res.id)} title="Basculer le statut de paiement"><PaymentBadge status={res.paymentStatus} /></button>
                <button onClick={() => setExpanded(isOpen ? null : res.id)} className="text-xs font-medium text-ink hover:underline">{isOpen ? 'Réduire' : 'Détails'}</button>
                <button onClick={() => setToDelete(res)} className="text-xs font-medium text-brick hover:underline">Supprimer</button>
              </div>
              {isOpen && <div className="px-4 pb-4 border-t border-paperdark pt-3"><ReservationDetail res={res} /></div>}
            </div>
          );
        })}
      </div>

      {toDelete && (
        <Modal title="Confirmer la suppression" onClose={() => setToDelete(null)}>
          <p className="text-sm mb-4">Supprimer définitivement la réservation de <strong>{toDelete.clientName}</strong> ? Cette action est irréversible.</p>
          <div className="flex gap-2 justify-end">
            <button onClick={() => setToDelete(null)} className="px-4 py-2 rounded-md text-sm border border-paperdark">Annuler</button>
            <button onClick={() => { onDelete(toDelete.id); setToDelete(null); }} className="px-4 py-2 rounded-md text-sm bg-brick text-white">Supprimer</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============================= EXPORTS ============================= */

function buildHumanRows(reservations) {
  return reservations.map((res) => ({
    Client: res.clientName,
    Local: LOCAUX.find((l) => l.id === res.local)?.name || res.local,
    Type: res.scheduleType === 'recurrent' ? 'Récurrent' : 'Ponctuel',
    Occurrences: res.occurrences.length,
    'Première date': res.occurrences[0] ? formatDateFR(res.occurrences[0].date) : '',
    'Dernière date': res.occurrences.length ? formatDateFR(res.occurrences[res.occurrences.length - 1].date) : '',
    Tarif: TARIFF_LABELS[res.tariffType],
    'Prix unitaire €': res.unitPrice,
    Quantité: res.quantity,
    'Remise %': res.discountPercent || 0,
    Matériel: res.equipement.map((e) => e.name).join(', '),
    'Caution €': resCaution(res),
    'TVA %': res.tvaPercent || 0,
    'Total TTC €': Math.round(resTotal(res) * 100) / 100,
    Statut: res.paymentStatus === 'paye' ? 'Payé' : 'En attente',
    Notes: res.notes || '',
  }));
}

function exportExcel(reservations) {
  const wb = XLSX.utils.book_new();
  const wsHuman = XLSX.utils.json_to_sheet(buildHumanRows(reservations));
  XLSX.utils.book_append_sheet(wb, wsHuman, 'Réservations');
  const dataRows = reservations.map((r) => ({ id: r.id, json: JSON.stringify(r) }));
  const wsData = XLSX.utils.json_to_sheet(dataRows);
  XLSX.utils.book_append_sheet(wb, wsData, '_data');
  XLSX.writeFile(wb, `reservations-asbl-${toISO(new Date())}.xlsx`);
}

function exportPDF(reservations) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text('Registre des réservations — ASBL', 14, 16);
  doc.setFontSize(10);
  doc.text(`Généré le ${new Date().toLocaleDateString('fr-BE')}`, 14, 22);
  const rows = reservations.map((r) => [
    r.clientName, LOCAUX.find((l) => l.id === r.local)?.name || r.local,
    r.occurrences.length + ' occ.', TARIFF_LABELS[r.tariffType],
    euro(resTotal(r)) + ' €', r.paymentStatus === 'paye' ? 'Payé' : 'En attente',
  ]);
  doc.autoTable({
    startY: 28,
    head: [['Client', 'Local', 'Créneaux', 'Tarif', 'Total', 'Statut']],
    body: rows,
    styles: { fontSize: 9 },
    headStyles: { fillColor: [27, 58, 75] },
  });
  doc.save(`reservations-asbl-${toISO(new Date())}.pdf`);
}

function exportWord(reservations) {
  const rowsHtml = reservations.map((r) => `
    <tr>
      <td>${escapeHtml(r.clientName)}</td>
      <td>${escapeHtml(LOCAUX.find((l) => l.id === r.local)?.name || r.local)}</td>
      <td>${r.occurrences.length}</td>
      <td>${TARIFF_LABELS[r.tariffType]}</td>
      <td>${euro(resTotal(r))} €</td>
      <td>${r.paymentStatus === 'paye' ? 'Payé' : 'En attente'}</td>
    </tr>`).join('');
  const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
    <head><meta charset="utf-8"><title>Réservations ASBL</title></head>
    <body>
      <h2>Registre des réservations — ASBL</h2>
      <p>Généré le ${new Date().toLocaleDateString('fr-BE')}</p>
      <table border="1" cellspacing="0" cellpadding="4" style="border-collapse:collapse;font-family:Arial;font-size:11px;">
        <thead><tr><th>Client</th><th>Local</th><th>Occurrences</th><th>Tarif</th><th>Total</th><th>Statut</th></tr></thead>
        <tbody>${rowsHtml}</tbody>

/* ============================= INSTALLATION PWA ============================= */

function InstallButton() {
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [isInstalled, setIsInstalled] = useState(false);
  const [showInstructions, setShowInstructions] = useState(false);

  useEffect(() => {
    const standaloneMql = window.matchMedia('(display-mode: standalone)');
    if (standaloneMql.matches || window.navigator.standalone) setIsInstalled(true);

    function handleBeforeInstallPrompt(e) {
      e.preventDefault();
      setDeferredPrompt(e);
    }
    function handleAppInstalled() {
      setIsInstalled(true);
      setDeferredPrompt(null);
    }
    window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
    window.addEventListener('appinstalled', handleAppInstalled);
    return () => {
      window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
      window.removeEventListener('appinstalled', handleAppInstalled);
    };
  }, []);

  async function handleClick() {
    if (deferredPrompt) {
      await deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;
      if (choice.outcome === 'accepted') setIsInstalled(true);
      setDeferredPrompt(null);
    } else {
      setShowInstructions(true);
    }
  }

  if (isInstalled) return null;

  return (
    <>
      <button onClick={handleClick} className="toolbtn px-3 py-1.5 rounded border border-white/30 text-white text-xs font-medium hover:bg-white/10">

            </div>

  );
}
