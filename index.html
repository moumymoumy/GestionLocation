function SyncView({ teamSession, onTeamJoined, onLeaveTeam, activityLog, syncing, syncError }) {
  const [mode, setMode] = useState(null); // null | 'create' | 'join'
  const [teamName, setTeamName] = useState('');
  const [adminPassword, setAdminPassword] = useState('');
  const [prenom, setPrenom] = useState('');
  const [joinCode, setJoinCode] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [copiedCode, setCopiedCode] = useState(null);

  if (!supabaseClient) {
    return (
      <div className="max-w-2xl mx-auto bg-card border border-paperdark rounded-md p-6 text-sm">
        <p className="text-brick font-medium mb-2">⚠ Synchronisation non configurée</p>
        <p className="text-muted">
          Les identifiants Supabase (SUPABASE_URL / SUPABASE_ANON_KEY) ne sont pas renseignés en haut
          du fichier index.html. Sans cette configuration, l'application fonctionne uniquement en local
          sur cet appareil.
        </p>
      </div>
    );
  }

  async function handleCreateTeam(e) {
    e.preventDefault();
    setError(null);
    if (adminPassword !== window.ADMIN_PASSWORD) {
      setError('Mot de passe administrateur incorrect.');
      return;
    }
    if (!prenom.trim()) {
      setError('Merci d\'indiquer votre prénom.');
      return;
    }
    setBusy(true);
    try {
      const team = await createTeamOnServer(teamName.trim(), prenom.trim());
      await pushTeamData(team.id, team.edit_code, [], prenom.trim());
      const session = { teamId: team.id, role: 'edit', prenom: prenom.trim(), teamName: team.name, editCode: team.edit_code, viewCode: team.view_code };
      onTeamJoined(session);
    } catch (err) {
      setError('Erreur lors de la création : ' + (err.message || 'inconnue'));
    }
    setBusy(false);
  }

  async function handleJoinTeam(e) {
    e.preventDefault();
    setError(null);
    if (!prenom.trim()) {
      setError('Merci d\'indiquer votre prénom.');
      return;
    }
    if (!joinCode.trim()) {
      setError('Merci de coller le code reçu.');
      return;
    }
    setBusy(true);
    try {
      const found = await findTeamByCode(joinCode.trim());
      if (!found) {
        setError('Code introuvable. Vérifiez qu\'il est correctement copié.');
        setBusy(false);
        return;
      }
      const session = {
        teamId: found.team.id,
        role: found.role,
        prenom: prenom.trim(),
        teamName: found.team.name,
        editCode: found.team.edit_code,
        viewCode: found.team.view_code,
      };
      onTeamJoined(session);
    } catch (err) {
      setError('Erreur lors de la connexion : ' + (err.message || 'inconnue'));
    }
    setBusy(false);
  }

  function copyCode(code, label) {
    navigator.clipboard.writeText(code).then(() => {
      setCopiedCode(label);
      setTimeout(() => setCopiedCode(null), 2000);
    });
  }

  if (teamSession) {
    return (
      <div className="max-w-2xl mx-auto space-y-4">
        <div className="bg-card border border-paperdark rounded-md p-5">
          <div className="flex items-center justify-between mb-3">
            <div>
              <p className="font-display text-lg font-semibold text-ink">{teamSession.teamName}</p>
              <p className="text-xs text-muted">
                Connecté en tant que <strong>{teamSession.prenom}</strong> ·{' '}
                {teamSession.role === 'edit' ? (
                  <span className="text-forestdark font-medium">accès modification</span>
                ) : (
                  <span className="text-amberdark font-medium">accès consultation seule</span>
                )}
              </p>
            </div>
            {syncing && <span className="text-[11px] text-muted">Synchronisation…</span>}
          </div>
          {syncError && <p className="text-xs text-brick mb-3">{syncError}</p>}

          {teamSession.role === 'edit' && (
            <div className="border-t border-paperdark pt-3 mt-3 space-y-2">
              <p className="text-xs font-semibold text-muted uppercase">Codes à partager</p>
              <div className="flex items-center gap-2">
                <span className="text-xs text-muted w-40">Code de modification :</span>
                <code className="font-mono text-sm bg-paperdark px-2 py-1 rounded">{teamSession.editCode}</code>
                <button onClick={() => copyCode(teamSession.editCode, 'edit')} className="toolbtn px-2 py-1 rounded border border-paperdark text-xs">
                  {copiedCode === 'edit' ? 'Copié ✓' : 'Copier'}
                </button>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-muted w-40">Code de consultation :</span>
                <code className="font-mono text-sm bg-paperdark px-2 py-1 rounded">{teamSession.viewCode}</code>
                <button onClick={() => copyCode(teamSession.viewCode, 'view')} className="toolbtn px-2 py-1 rounded border border-paperdark text-xs">
                  {copiedCode === 'view' ? 'Copié ✓' : 'Copier'}
                </button>
              </div>
            </div>
          )}

          <div className="border-t border-paperdark pt-3 mt-3">
            <button
              onClick={() => { if (confirm('Quitter cette équipe ? Vos données locales resteront intactes sur cet appareil.')) onLeaveTeam(); }}
              className="toolbtn px-3 py-1.5 rounded border border-paperdark text-xs font-medium text-brick"
            >
              Quitter l'équipe
            </button>
          </div>
        </div>

        <div className="bg-card border border-paperdark rounded-md p-5">
          <p className="text-xs font-semibold text-muted uppercase mb-3">Journal d'activité (15 dernières actions)</p>
          {activityLog.length === 0 && <p className="text-sm text-muted">Aucune activité pour l'instant.</p>}
          <ul className="space-y-2">
            {activityLog.map((entry) => (
              <li key={entry.id} className="text-sm border-b border-paperdark/60 pb-2 last:border-0">
                <span className="font-medium text-ink">{entry.author_name}</span>{' '}
                <span className="text-inktext">{entry.description}</span>{' '}
                <span className="text-muted text-xs">
                  · {new Date(entry.created_at).toLocaleString('fr-BE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}
                </span>
              </li>
            ))}
          </ul>
        </div>
      </div>
    );
  }

  return (
    <div className="max-w-2xl mx-auto space-y-4">
      {!mode && (
        <div className="bg-card border border-paperdark rounded-md p-6 text-center space-y-4">
          <p className="text-muted text-sm">
            Cet appareil n'est relié à aucune équipe. Les données restent alors uniquement sur cet
            appareil (circuit fermé).
          </p>
          <div className="flex justify-center">
            <button onClick={() => setMode('join')} className="toolbtn px-6 py-2.5 rounded bg-ink text-white font-medium">
              Rejoindre une équipe avec un code
            </button>
          </div>
          <p className="text-xs text-muted pt-2 border-t border-paperdark/60">
            Vous êtes responsable de cette application ?{' '}
            <button onClick={() => setMode('create')} className="underline hover:text-ink">
              Créer une nouvelle équipe
            </button>
          </p>
        </div>
      )}

      {mode === 'create' && (
        <form onSubmit={handleCreateTeam} className="bg-card border border-paperdark rounded-md p-6 space-y-3">
          <p className="font-display text-lg font-semibold text-ink mb-2">Créer l'équipe</p>
          <div>
            <label className="text-xs font-medium text-muted block mb-1">Nom de l'équipe</label>
            <input value={teamName} onChange={(e) => setTeamName(e.target.value)} placeholder="ex : Registre Réservations ASBL"
              className="w-full border border-paperdark rounded px-3 py-2 text-sm" />
          </div>
          <div>
            <label className="text-xs font-medium text-muted block mb-1">Mot de passe administrateur</label>
            <input type="password" value={adminPassword} onChange={(e) => setAdminPassword(e.target.value)}
              className="w-full border border-paperdark rounded px-3 py-2 text-sm" />
          </div>
          <div>
            <label className="text-xs font-medium text-muted block mb-1">Votre prénom</label>
            <input value={prenom} onChange={(e) => setPrenom(e.target.value)}
              className="w-full border border-paperdark rounded px-3 py-2 text-sm" />
          </div>
          {error && <p className="text-xs text-brick">{error}</p>}
          <div className="flex gap-2 justify-end pt-2">
            <button type="button" onClick={() => setMode(null)} className="toolbtn px-3 py-2 rounded border border-paperdark text-sm">Annuler</button>
            <button type="submit" disabled={busy} className="toolbtn px-4 py-2 rounded bg-ink text-white text-sm font-medium">
              {busy ? 'Création...' : 'Créer l\'équipe'}
            </button>
          </div>
        </form>
      )}

      {mode === 'join' && (
        <form onSubmit={handleJoinTeam} className="bg-card border border-paperdark rounded-md p-6 space-y-3">
          <p className="font-display text-lg font-semibold text-ink mb-2">Rejoindre une équipe</p>
          <div>
            <label className="text-xs font-medium text-muted block mb-1">Code reçu</label>
            <input value={joinCode} onChange={(e) => setJoinCode(e.target.value)} placeholder="XXXX-XXXX"
              className="w-full border border-paperdark rounded px-3 py-2 text-sm font-mono" />
          </div>
          <div>
            <label className="text-xs font-medium text-muted block mb-1">Votre prénom</label>
            <input value={prenom} onChange={(e) => setPrenom(e.target.value)}
              className="w-full border border-paperdark rounded px-3 py-2 text-sm" />
          </div>
          <p className="text-xs text-muted">
            ⚠ Le projet de l'équipe remplacera les données actuellement affichées sur cet appareil.
          </p>
          {error && <p className="text-xs text-brick">{error}</p>}
          <div className="flex gap-2 justify-end pt-2">
            <button type="button" onClick={() => setMode(null)} className="toolbtn px-3 py-2 rounded border border-paperdark text-sm">Annuler</button>
            <button type="submit" disabled={busy} className="toolbtn px-4 py-2 rounded bg-ink text-white text-sm font-medium">
              {busy ? 'Connexion...' : 'Rejoindre'}
            </button>
          </div>
        </form>
      )}
    </div>
  );
}

/* ============================= APP ============================= */

function App() {
  const [reservations, setReservations] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { const parsed = JSON.parse(raw); if (Array.isArray(parsed)) return parsed; }
    } catch (e) {}
    return buildSeedReservations();
  });
  const [tab, setTab] = useState('nouvelle');
  const jsonInputRef = useRef(null);
  const excelInputRef = useRef(null);

  const [fileHandle, setFileHandle] = useState(null);
  const [fileLinkStatus, setFileLinkStatus] = useState(FS_SUPPORTED ? 'checking' : 'unsupported');
  const [lastSavedAt, setLastSavedAt] = useState(null);

  // ---- Synchronisation d'équipe ----
  const [teamSession, setTeamSession] = useState(() => loadTeamSession());
  const [activityLog, setActivityLog] = useState([]);
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const skipNextPushRef = useRef(false);
  const prevReservationsRef = useRef(null);
  const realtimeChannelRef = useRef(null);

  const canEdit = !teamSession || teamSession.role === 'edit';

  function handleTeamJoined(session) {
    saveTeamSession(session);
    setTeamSession(session);
  }
  function handleLeaveTeam() {
    if (realtimeChannelRef.current) {
      supabaseClient.removeChannel(realtimeChannelRef.current);
      realtimeChannelRef.current = null;
    }
    saveTeamSession(null);
    setTeamSession(null);
    setActivityLog([]);
  }

  // Au démarrage / changement d'équipe : charger les données de l'équipe et démarrer
  // l'actualisation périodique sécurisée (remplace le temps réel, qui exigeait une
  // lecture ouverte à tous côté base de données). Chaque actualisation redemande les
  // données EN FOURNISSANT le code — le serveur refuse de répondre si le code n'est
  // plus valide. Léger délai (jusqu'à 20s) au lieu d'une mise à jour instantanée, en
  // échange d'une vraie fermeture de la lecture à qui n'a pas le code.
  useEffect(() => {
    if (!teamSession || !supabaseClient) return;
    let cancelled = false;
    const codeAUtiliser = teamSession.editCode || teamSession.viewCode;

    async function chargerDonnees() {
      try {
        const remote = await fetchTeamData(teamSession.teamId, codeAUtiliser);
        if (cancelled) return;
        if (remote && Array.isArray(remote.data)) {
          skipNextPushRef.current = true;
          prevReservationsRef.current = remote.data;
          setReservations(remote.data);
        }
        const log = await fetchActivityLog(teamSession.teamId, codeAUtiliser);
        if (!cancelled) setActivityLog(log);
      } catch (err) {
        if (!cancelled) setSyncError('Impossible de récupérer les données de l\'équipe : ' + (err.message || ''));
      }
      if (!cancelled) setSyncing(false);
    }

    setSyncing(true);
    setSyncError(null);
    chargerDonnees();

    const intervalId = setInterval(() => {
      if (!cancelled) chargerDonnees();
    }, 20000);

    return () => {
      cancelled = true;
      clearInterval(intervalId);
    };
  }, [teamSession && teamSession.teamId]);

  // Pousser les changements locaux vers l'équipe (sauf si le changement vient lui-même du serveur)
  useEffect(() => {
    if (!teamSession || !supabaseClient) { prevReservationsRef.current = reservations; return; }
    if (skipNextPushRef.current) {
      skipNextPushRef.current = false;
      return;
    }
    const description = describeReservationsDiff(prevReservationsRef.current, reservations);
    prevReservationsRef.current = reservations;
    setSyncing(true);
    pushTeamData(teamSession.teamId, teamSession.editCode, reservations, teamSession.prenom)
      .then((ok) => {
        if (!ok) { setSyncError("Sauvegarde refusée : code d'édition invalide ou manquant."); return; }
        return pushActivityLog(teamSession.teamId, teamSession.editCode, teamSession.prenom, description);
      })
      .catch((err) => setSyncError('Erreur de synchronisation : ' + (err.message || '')))
      .finally(() => setSyncing(false));
  }, [reservations]);

  // Au démarrage : tenter de retrouver un fichier physique déjà lié (IndexedDB conserve le handle)
  useEffect(() => {
    if (!FS_SUPPORTED) return;
    (async () => {
      try {
        const handle = await idbGet('reservationsFile');
        if (!handle) { setFileLinkStatus('none'); return; }
        const perm = await handle.queryPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          setFileHandle(handle);
          setFileLinkStatus('linked');
          const file = await handle.getFile();
          const text = await file.text();
          if (text && text.trim()) {
            const data = JSON.parse(text);
            if (Array.isArray(data)) setReservations(data);
          }
        } else {
          setFileHandle(handle);
          setFileLinkStatus('permission-needed');
        }
      } catch (e) { setFileLinkStatus('none'); }
    })();
  }, []);

  // Sauvegarde automatique à chaque changement : toujours en localStorage (filet de sécurité),
  // et sur le fichier physique lié si disponible.
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations)); } catch (e) {}
    if (fileHandle && fileLinkStatus === 'linked') {
      writeReservationsToFile(fileHandle, reservations).then((ok) => { if (ok) setLastSavedAt(Date.now()); });
    }
  }, [reservations]);

  async function handleLinkNewFile() {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'reservations-asbl.json',
        types: [{ description: 'Fichier JSON', accept: { 'application/json': ['.json'] } }],
      });
      await idbSet('reservationsFile', handle);
      setFileHandle(handle);
      setFileLinkStatus('linked');
      const ok = await writeReservationsToFile(handle, reservations);
      if (ok) setLastSavedAt(Date.now());
    } catch (e) {}
  }
  async function handleOpenExistingFile() {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Fichier JSON', accept: { 'application/json': ['.json'] } }],
        multiple: false,
      });
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm !== 'granted') return;
      await idbSet('reservationsFile', handle);
      setFileHandle(handle);
      setFileLinkStatus('linked');
      const file = await handle.getFile();
      const text = await file.text();
      if (text && text.trim()) {
        const data = JSON.parse(text);
        if (Array.isArray(data)) setReservations(data);
      }
      setLastSavedAt(Date.now());
    } catch (e) {}
  }
  async function handleReconnectFile() {
    if (!fileHandle) return;
    try {
      const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        setFileLinkStatus('linked');
        const file = await fileHandle.getFile();
        const text = await file.text();
        if (text && text.trim()) {
          const data = JSON.parse(text);
          if (Array.isArray(data)) setReservations(data);
        }
      }
    } catch (e) {}
  }

  function handleCreate(res) { setReservations((prev) => [...prev, res]); setTab('planning'); }
  function handleTogglePaiement(id) {
    setReservations((prev) => prev.map((r) => (r.id === id ? { ...r, paymentStatus: r.paymentStatus === 'paye' ? 'attente' : 'paye' } : r)));
  }
  function handleDelete(id) { setReservations((prev) => prev.filter((r) => r.id !== id)); }

  function handleImportJSONFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (Array.isArray(data)) setReservations(data);
        else alert('Fichier JSON invalide.');
      } catch (err) { alert('Fichier JSON invalide.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
  function handleImportExcelFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: 'array' });
        const sheet = wb.Sheets['_data'];
        if (!sheet) { alert('Feuille "_data" introuvable — utilisez un fichier Excel exporté depuis cette application.'); return; }
        const rows = XLSX.utils.sheet_to_json(sheet);
        const restored = rows.map((r) => JSON.parse(r.json));
        setReservations(restored);
      } catch (err) { alert('Impossible de lire ce fichier Excel.'); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  }

  const tabs = [
    { id: 'nouvelle', label: 'Nouvelle demande' },
    { id: 'planning', label: 'Planning' },
    { id: 'materiel', label: 'Matériel' },
    { id: 'liste', label: 'Réservations' },
    { id: 'sync', label: teamSession ? '🔗 Synchronisation' : 'Synchronisation' },
  ];

  const contentReadOnly = !canEdit && tab !== 'sync';

  return (
    <div className="min-h-screen bg-paperdark">
      <div className="bg-ink text-white">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5 flex items-center justify-between flex-wrap gap-2">
          <div>
            <div className="font-display text-2xl font-semibold tracking-wide">Registre</div>
            <div className="text-xs text-white/70">Réservations de locaux & matériel — gestion manuelle</div>
          </div>
          <div className="flex items-center gap-3">
            <InstallButton />
            {teamSession && (
              <div className="text-xs text-white/80 text-right">
                <div>{teamSession.teamName}</div>
                <div>{teamSession.prenom} · {teamSession.role === 'edit' ? 'modification' : 'consultation seule'}</div>
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="bg-inkdark/95">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto">
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`ledger-tab ${tab === t.id ? 'active' : ''} px-5 py-2.5 text-sm font-medium rounded-t-md whitespace-nowrap ${tab === t.id ? 'text-ink' : 'text-white/70 hover:text-white'}`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-4 sm:px-6 pt-5">
        <div className={`bg-card border border-paperdark rounded-md px-4 py-3 mb-5 text-xs text-inktext ${contentReadOnly ? 'pointer-events-none opacity-50' : ''}`}>
          <div className="flex flex-wrap items-center gap-2">
            {fileLinkStatus === 'unsupported' && (
              <span className="text-muted">🔒 Ce navigateur ne permet pas de lier un fichier physique (fonctionne sur Chrome/Edge, ordinateur). Vos données sont sauvegardées automatiquement dans ce navigateur. Utilisez Exporter pour transférer vers votre smartphone.</span>
            )}
            {fileLinkStatus === 'checking' && <span className="text-muted">Vérification de la sauvegarde…</span>}
            {fileLinkStatus === 'none' && (
              <>
                <span className="text-muted">💾 Données sauvegardées dans ce navigateur. Pour une sauvegarde plus sûre sur un vrai fichier de votre laptop :</span>
                <button onClick={handleLinkNewFile} className="toolbtn px-2.5 py-1 rounded bg-ink text-white font-medium">🔗 Créer un fichier de sauvegarde</button>
                <button onClick={handleOpenExistingFile} className="toolbtn px-2.5 py-1 rounded border border-paperdark font-medium">📂 Lier un fichier existant</button>
              </>
            )}
            {fileLinkStatus === 'linked' && (
              <>
                <span className="text-forestdark font-medium">🔗 Sauvegarde automatique active{fileHandle?.name ? ` — ${fileHandle.name}` : ''}</span>
                {lastSavedAt && <span className="text-muted">· enregistré {new Date(lastSavedAt).toLocaleTimeString('fr-BE')}</span>}
                <button onClick={handleLinkNewFile} className="toolbtn px-2.5 py-1 rounded border border-paperdark font-medium ml-auto">Changer de fichier</button>
              </>
            )}
            {fileLinkStatus === 'permission-needed' && (
              <>
                <span className="text-amberdark font-medium">⚠ Autorisation requise pour reprendre la sauvegarde sur {fileHandle?.name}.</span>
                <button onClick={handleReconnectFile} className="toolbtn px-2.5 py-1 rounded bg-amber text-white font-medium">Reconnecter</button>
              </>
            )}
          </div>
          <div className="flex flex-wrap items-center gap-2 mt-2 pt-2 border-t border-paperdark/70">
            <span className="text-muted font-semibold">Exporter :</span>
            <button onClick={() => exportJSON(reservations)} className="toolbtn px-2 py-1 rounded border border-paperdark">JSON</button>
            <button onClick={() => exportExcel(reservations)} className="toolbtn px-2 py-1 rounded border border-paperdark">Excel</button>
            <button onClick={() => exportPDF(reservations)} className="toolbtn px-2 py-1 rounded border border-paperdark">PDF</button>
            <button onClick={() => exportWord(reservations)} className="toolbtn px-2 py-1 rounded border border-paperdark">Word</button>
            <span className="text-muted font-semibold ml-3">Importer :</span>
            <button onClick={() => jsonInputRef.current.click()} className="toolbtn px-2 py-1 rounded border border-paperdark">JSON</button>
            <button onClick={() => excelInputRef.current.click()} className="toolbtn px-2 py-1 rounded border border-paperdark">Excel</button>
            <input type="file" accept="application/json" ref={jsonInputRef} onChange={handleImportJSONFile} className="hidden" />
            <input type="file" accept=".xlsx" ref={excelInputRef} onChange={handleImportExcelFile} className="hidden" />
            <span className="text-muted text-[11px] ml-2">(PDF/Word : rapports imprimables — Excel/JSON : sauvegardes réutilisables)</span>
          </div>
        </div>
      </div>

      <div className={`max-w-6xl mx-auto px-4 sm:px-6 pb-8 ${contentReadOnly ? 'pointer-events-none opacity-60 select-none' : ''}`}>
        {tab === 'nouvelle' && <NewReservationForm reservations={reservations} onCreate={handleCreate} />}
        {tab === 'planning' && <PlanningView reservations={reservations} />}
        {tab === 'materiel' && <MaterielView reservations={reservations} />}
        {tab === 'liste' && <ReservationsListView reservations={reservations} onTogglePaiement={handleTogglePaiement} onDelete={handleDelete} />}
      </div>
      {tab === 'sync' && (
        <div className="max-w-6xl mx-auto px-4 sm:px-6 pb-8">
          <SyncView
            teamSession={teamSession}
            onTeamJoined={handleTeamJoined}
            onLeaveTeam={handleLeaveTeam}
            activityLog={activityLog}
            syncing={syncing}
            syncError={syncError}
          />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

</script>
</body>
</html>
